name: CI/CD Pipeline

on:
  push:
  pull_request:

jobs:

  # ─────────────────────────────────────────────
  # STAGE 1: LINT
  # ─────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python - api
        run: flake8 . --max-line-length=100
        working-directory: api

      - name: Lint Python - worker
        run: flake8 . --max-line-length=100
        working-directory: worker

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install ESLint
        run: npm install --save-dev eslint
        working-directory: frontend

      - name: Lint JavaScript
        run: npx eslint app.js
        working-directory: frontend

      - name: Lint api Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          args: --no-fail

      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
          args: --no-fail

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          args: --no-fail
  # ─────────────────────────────────────────────
  # STAGE 2: TEST
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies + pytest
        run: pip install -r requirements.txt pytest pytest-cov
        working-directory: api

      - name: Run tests with coverage
        run: pytest tests/ --cov=. --cov-report=xml --cov-report=term
        working-directory: api

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  # ─────────────────────────────────────────────
  # STAGE 3: BUILD
  # Pushes to a local registry running as a
  # service container, then saves images as
  # tar artifacts for use in later stages.
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest

      # Save images as tarballs so later jobs can load them
      - name: Save images as artifacts
        run: |
          docker pull localhost:5000/api:latest
          docker pull localhost:5000/worker:latest
          docker pull localhost:5000/frontend:latest
          docker save localhost:5000/api:latest     -o api.tar
          docker save localhost:5000/worker:latest  -o worker.tar
          docker save localhost:5000/frontend:latest -o frontend.tar

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            api.tar
            worker.tar
            frontend.tar

  # ─────────────────────────────────────────────
  # STAGE 4: SECURITY SCAN
  # ─────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load images
        run: |
          docker load -i api.tar
          docker load -i worker.tar
          docker load -i frontend.tar

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/api:latest
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: "1"

      - name: Scan worker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/worker:latest
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: "1"

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/frontend:latest
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: "1"

      - name: Upload SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  # ─────────────────────────────────────────────
  # STAGE 5: INTEGRATION TEST
  # Spins up the full stack, submits a job,
  # polls until complete, asserts status.
  # ─────────────────────────────────────────────
  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Start full stack
        run: docker compose up --build -d

      - name: Wait for frontend to be healthy
        run: |
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' \
              hng14-stage2-devops_frontend_1 2>/dev/null || echo "starting")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "healthy" ]; then exit 0; fi
            sleep 5
          done
          echo "Frontend never became healthy"
          exit 1

      - name: Submit a job
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:3000/submit)
          echo "$RESPONSE"
          JOB_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll until job completes
        run: |
          for i in $(seq 1 20); do
            STATUS=$(curl -sf http://localhost:3000/status/$JOB_ID | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "Attempt $i: status=$STATUS"
            if [ "$STATUS" = "completed" ]; then exit 0; fi
            sleep 3
          done
          echo "Job never completed"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────────
  # STAGE 6: DEPLOY
  # Only runs on pushes to main.
  # SSHes into  Stage 1 server and runs
  # the rolling update script.
  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Copy deploy script to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: scripts/rolling-deploy.sh
          target: ~/deploy/

      - name: Rolling deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/hng14-stage2-devops
            git pull origin main
            chmod +x ~/deploy/scripts/rolling-deploy.sh
            docker compose pull
            ~/deploy/scripts/rolling-deploy.sh api   ${{ secrets.DOCKER_IMAGE_API }}:${{ github.sha }}
            ~/deploy/scripts/rolling-deploy.sh worker ${{ secrets.DOCKER_IMAGE_WORKER }}:${{ github.sha }}
            ~/deploy/scripts/rolling-deploy.sh frontend ${{ secrets.DOCKER_IMAGE_FRONTEND }}:${{ github.sha }}
